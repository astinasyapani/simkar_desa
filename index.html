  body{font-family:'Segoe UI', Roboto, -apple-system, "Helvetica Neue", Arial, sans-serif;}

  .dark ::-webkit-scrollbar-thumb{background:#2a3c52;}
  .fade-in{animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .toggle-track{width:44px;height:24px;border-radius:20px;background:#dbe2e8;position:relative;transition:background .2s;}
  .toggle-track.on{background:#12a795;}
  .toggle-knob{position:absolute;top:2.5px;left:3px;width:19px;height:19px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
  .toggle-track.on .toggle-knob{left:22px;}
  .prog-track{width:100%;background:#e9eef2;border-radius:20px;height:8px;overflow:hidden;}
  .dark .prog-track{background:#1c2b3d;}
  .prog-fill{height:100%;border-radius:20px;}
  input,select,textarea{outline:none;}
  .brand-underline{height:2px;width:46px;background:linear-gradient(90deg,#12a795,#e6a53c);border-radius:2px;}

function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw) return seedData();
    const parsed = JSON.parse(raw);
    const base = seedData();
    parsed.auth = { loggedIn:false, role:null, name:"", email:"" }; // always require fresh login per session
    return Object.assign(base, parsed);
  }catch(e){
    console.error("Gagal memuat data, memakai data awal.", e);
    return seedData();
  }
}

function saveState(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ console.error("Gagal menyimpan data", e); }
}

   ============================================================ */
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(str){ const d=document.createElement("div"); d.textContent = str==null?"":String(str); return d.innerHTML; }
function fmtDate(ts){ return new Date(ts).toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric"}); }
function timeAgo(ts){
  const diff = Math.max(0, Date.now()-ts); const min = Math.floor(diff/60000);
  if(min<1) return "Baru saja"; if(min<60) return min+" menit lalu";
  const hr = Math.floor(min/60); if(hr<24) return hr+" jam lalu";
  return Math.floor(hr/24)+" hari lalu";
}
function layananById(id){ return state.layanan.find(l=>l.id===id); }
function aparaturById(id){ return state.aparaturList.find(a=>a.id===id); }
function initials(name){ return (name||"?").trim().split(/\s+/).slice(0,2).map(s=>s[0]).join("").toUpperCase(); }

function showToast(msg){
  const t = document.getElementById("toast");
  document.getElementById("toastMsg").textContent = msg;
  t.classList.remove("translate-y-10","opacity-0","pointer-events-none");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(()=> t.classList.add("translate-y-10","opacity-0","pointer-events-none"), 2600);
}

function renderTopLayanan(){
  const counts = {};
  state.pengajuan.forEach(p=> counts[p.layananId] = (counts[p.layananId]||0)+1);
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,5);
  if(sorted.length===0) return `<p class="text-sm text-slate-500 py-6 text-center">Belum ada data.</p>`;
  const max = sorted[0][1];
  return `<div class="space-y-3">
    ${sorted.map(([id,count])=>{
      const l = layananById(id);
      const pct = Math.round(count/max*100);
      return `<div>
        <div class="flex justify-between text-xs font-bold text-navy-800 dark:text-slate-200 mb-1">
          <span class="truncate pr-2">${esc(l?l.nama:"-")}</span><span>${count}</span>
        </div>
        <div class="prog-track"><div class="prog-fill bg-gradient-to-r from-toska-500 to-toska-600" style="width:${pct}%;"></div></div>
      </div>`;
    }).join("")}
  </div>`;
}

function pageMsTracking(){
  const mine = state.pengajuan.filter(p => p.email.toLowerCase()===state.auth.email.toLowerCase() || p.pemohon.toLowerCase()===state.auth.name.toLowerCase())

  }
  return `<div class="space-y-4">
    ${mine.map(p=>{
      const lyn = layananById(p.layananId);
      const steps = ["Diajukan","Proses","Selesai"];
      const isDitolak = p.status==="Ditolak";
      return `<div class="bg-white dark:bg-navy-900 border border-slate-200 dark:border-navy-700 rounded-2xl p-5">

          </div>
          ${statusBadge(p.status)}

        ${isDitolak ? `<div class="text-xs bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 rounded-lg px-3 py-2 mb-2">
            Pengajuan ditolak. ${p.catatanPimpinan ? "Catatan: "+esc(p.catatanPimpinan) : "Silakan hubungi kantor untuk informasi lebih lanjut."}

              const reached = steps.indexOf(p.status) >= i;
              return `<div class="flex items-center flex-1 last:flex-none">
                <div class="w-7 h-7 rounded-full flex items-center justify-center text-[10px] font-bold flex-shrink-0 ${reached?'bg-toska-600 text-white':'bg-slate-200 dark:bg-navy-700 text-slate-400'}">${i+1}</div>
                <span class="text-[11px] font-bold ml-1.5 ${reached?'text-navy-800 dark:text-white':'text-slate-400'}">${s}</span>
                ${i<steps.length-1?`<div class="flex-1 h-0.5 mx-2 ${steps.indexOf(p.status)>i?'bg-toska-600':'bg-slate-200 dark:bg-navy-700'}"></div>`:""}
              </div>`;
            }).join("")}
          </div>`}
      </div>`;
    }).join("")}
  </div>`;
}

      <div class="w-16 h-16 rounded-full bg-navy-800 text-white flex items-center justify-center text-xl font-bold flex-shrink-0">${initials(state.auth.name)}</div>
      <label class="text-xs font-bold border border-slate-300 dark:border-navy-600 rounded-lg px-3 py-2 cursor-pointer">
        Ganti Foto Profil <input type="file" accept="image/*" class="hidden" data-act="noopFile">
      </label>
    </div>
    <form id="profilForm" class="space-y-4">
      <div>
        <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Nama Lengkap</label>
        <input id="profNama" type="text" value="${esc(state.auth.name)}" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
      </div>
      <div>
        <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Email</label>
        <input id="profEmail" type="email" value="${esc(state.auth.email)}" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
      </div>
      <div>
        <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Kata Sandi Baru</label>
        <input id="profPassword" type="password" placeholder="Kosongkan jika tidak diubah" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
      </div>
      <button type="submit" class="bg-toska-700 text-white font-bold px-5 py-2.5 rounded-lg text-sm">Simpan Perubahan</button>
    </form>
  </div>`;
}

/* ============================================================
   MODAL: TAMBAH / EDIT LAYANAN
   ============================================================ */
function openLayananModal(editId){
  const item = editId ? layananById(editId) : null;
  const wrap = document.createElement("div");
  wrap.id = "layananModalWrap";
  wrap.className = "fixed inset-0 z-50 flex items-start justify-center p-4 py-10 overflow-y-auto bg-black/50";
  wrap.innerHTML = `
    <div class="bg-white dark:bg-navy-900 rounded-2xl w-full max-w-md fade-in">
      <div class="px-5 py-4 border-b border-slate-200 dark:border-navy-700 flex items-center justify-between">
        <h3 class="font-display font-bold text-navy-900 dark:text-white">${item?"Edit Layanan":"Tambah Layanan Baru"}</h3>
        <button data-act="closeLayananModal" class="w-8 h-8 rounded-lg bg-slate-100 dark:bg-navy-800 flex items-center justify-center">&times;</button>
      </div>
      <div class="p-5 space-y-4">
        <div>
          <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Nama Layanan</label>
          <input id="mNama" type="text" value="${item?esc(item.nama):""}" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Kategori</label>
          <input id="mKategori" type="text" value="${item?esc(item.kategori):""}" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Estimasi Waktu</label>
          <input id="mEstimasi" type="text" value="${item?esc(item.estimasi):""}" placeholder="Contoh: 2 hari kerja" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-navy-800 dark:text-slate-300 mb-1.5">Syarat (satu per baris)</label>
          <textarea id="mSyarat" rows="4" class="w-full border border-slate-300 dark:border-navy-600 dark:bg-navy-800 rounded-lg px-3 py-2.5 text-sm">${item?item.syarat.join("\\n"):""}</textarea>
        </div>
      </div>
      <div class="px-5 py-4 border-t border-slate-200 dark:border-navy-700 flex justify-end gap-2.5">
        <button data-act="closeLayananModal" class="border border-slate-300 dark:border-navy-600 font-bold text-sm px-4 py-2 rounded-lg">Batal</button>
        <button data-act="submitLayanan" data-id="${editId||''}" class="bg-toska-700 text-white font-bold text-sm px-4 py-2 rounded-lg">Simpan</button>
      </div>
    </div>`;
  document.body.appendChild(wrap);
}
function closeLayananModal(){
  const el = document.getElementById("layananModalWrap");
  if(el) el.remove();
}

/* ============================================================
   CHARTS
   ============================================================ */
let pmStatusChartInst=null, pmKinerjaChartInst=null;
function renderChartsIfNeeded(){
  if(state.route==="pm-dashboard"){
    const ctx = document.getElementById("pmStatusChart");
    if(ctx){
      const statuses = ["Diajukan","Proses","Selesai","Ditolak"];
      const counts = statuses.map(s=> state.pengajuan.filter(p=>p.status===s).length);
      if(pmStatusChartInst) pmStatusChartInst.destroy();
      pmStatusChartInst = new Chart(ctx, {
        type:"bar",
        data:{ labels:statuses, datasets:[{ data:counts, backgroundColor:["#94a3b8","#e6a53c","#12a795","#c0432f"], borderRadius:8 }]},
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{ beginAtZero:true, ticks:{stepSize:1} }, x:{ grid:{display:false} } } }
      });
    }
  }
  if(state.route==="pm-analitik"){
    const ctx = document.getElementById("pmKinerjaChart");
    if(ctx){
      if(pmKinerjaChartInst) pmKinerjaChartInst.destroy();
      pmKinerjaChartInst = new Chart(ctx, {
        type:"bar",
        data:{
          labels: state.aparaturList.map(a=>a.name.split(" ")[0]),
          datasets:[
            { label:"Layanan Selesai", data: state.aparaturList.map(a=>a.completed), backgroundColor:"#12a795", borderRadius:6 },
            { label:"Rating x10", data: state.aparaturList.map(a=>Math.round(a.rating*10)), backgroundColor:"#e6a53c", borderRadius:6 }
          ]
        },
        options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:"bottom"}}, scales:{ y:{beginAtZero:true} } }
      });
    }
  }
}

/* ============================================================
   EVENT DELEGATION
   ============================================================ */
document.addEventListener("click", function(e){
  const btn = e.target.closest("[data-act]");
  if(!btn) return;
  const act = btn.dataset.act;

  if(act==="nav"){ state.route = btn.dataset.route; saveState(); render(); }
  else if(act==="openSidebar"){ document.getElementById("sidebar").classList.remove("-translate-x-full"); document.getElementById("mobileOverlay").classList.remove("hidden"); }
  else if(act==="closeSidebar"){ document.getElementById("sidebar").classList.add("-translate-x-full"); document.getElementById("mobileOverlay").classList.add("hidden"); }
  else if(act==="toggleDark"){ state.settings.darkMode = !state.settings.darkMode; saveState(); render(); }
  else if(act==="logout"){
    if(confirm("Keluar dari sesi ini?")){
      state.auth = { loggedIn:false, role:null, name:"", email:"" };
      state.route = null;
      saveState(); render();
    }
  }
  else if(act==="openLayananModal"){ openLayananModal(null); }
  else if(act==="editLayanan"){ openLayananModal(btn.dataset.id); }
  else if(act==="closeLayananModal"){ closeLayananModal(); }
  else if(act==="deleteLayanan"){
    const item = layananById(btn.dataset.id);
    if(item && confirm(`Hapus layanan "${item.nama}"?`)){
      state.layanan = state.layanan.filter(l=>l.id!==btn.dataset.id);
      saveState(); render(); showToast("Layanan berhasil dihapus");
    }
  }
  else if(act==="submitLayanan"){
    const id = btn.dataset.id;
    const nama = document.getElementById("mNama").value.trim();
    const kategori = document.getElementById("mKategori").value.trim() || "Umum";
    const estimasi = document.getElementById("mEstimasi").value.trim() || "-";
    const syarat = document.getElementById("mSyarat").value.split("\n").map(s=>s.trim()).filter(Boolean);
    if(!nama){ showToast("Nama layanan wajib diisi"); return; }
    if(id){
      const item = layananById(id);
      Object.assign(item, { nama, kategori, estimasi, syarat });
      showToast("Layanan berhasil diperbarui");
    }else{
      state.layanan.push({ id:uid(), nama, kategori, estimasi, syarat });
      showToast("Layanan baru berhasil ditambahkan");
    }
    saveState(); closeLayananModal(); render();
  }
  else if(act==="markAllRead"){
    state.notifikasi.forEach(n=>{ if(n.target===state.auth.role) n.read = true; });
    saveState(); render(); showToast("Semua notifikasi ditandai dibaca");
  }
  else if(act==="readNotif"){
    const n = state.notifikasi.find(x=>x.id===btn.dataset.id);
    if(n && !n.read){ n.read = true; saveState(); render(); }
  }
  else if(act==="addCatatan"){
    const input = document.querySelector(`[data-catatan-input="${btn.dataset.id}"]`);
    const text = input.value.trim();
    if(!text) return;
    state.catatanPimpinan.push({ id:uid(), aparaturId:btn.dataset.id, text, time:Date.now() });
    const ap = aparaturById(btn.dataset.id);
    state.notifikasi.unshift({ id:uid(), target:"aparatur", title:"Catatan dari Pimpinan", desc:text, time:Date.now(), read:false, type:"warning" });
    saveState(); render(); showToast("Catatan evaluasi terkirim ke "+ap.name);
  }
  else if(act==="saveSistem"){
    state.settings.instansi = document.getElementById("sysInstansi").value.trim() || state.settings.instansi;
    saveState(); render(); showToast("Pengaturan sistem tersimpan");
  }
  else if(act==="ajukanFromKatalog"){
    state._preselectLayanan = btn.dataset.id;
    state.route = "ms-ajukan"; saveState(); render();
  }
  else if(act==="noopFile"){ /* mock only */ }
});

document.addEventListener("change", function(e){
  if(e.target.dataset.act==="changeStatus"){
    const p = state.pengajuan.find(x=>x.id===e.target.dataset.id);
    if(!p) return;
    const newStatus = e.target.value;
    p.status = newStatus;
    p.history.push({ status:newStatus, time:Date.now() });
    saveState(); render(); showToast("Status pengajuan diperbarui");
  }
  if(e.target.id==="sysLogoInput"){
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => { state.settings.logo = ev.target.result; saveState(); render(); showToast("Logo instansi diperbarui"); };
    reader.readAsDataURL(file);
  }
});

document.addEventListener("submit", function(e){
  e.preventDefault();
  if(e.target.id==="loginForm"){
    const role = document.getElementById("loginRole").value;
    const name = document.getElementById("loginName").value.trim();
    const email = document.getElementById("loginEmail").value.trim();
    if(!name || !email){ showToast("Nama dan email wajib diisi"); return; }
    state.auth = { loggedIn:true, role, name, email };
    state.route = defaultRouteFor(role);
    saveState(); render(); showToast("Berhasil masuk sebagai "+ROLE_LABEL[role]);
  }
  if(e.target.id==="ajukanForm"){
    const layananId = document.getElementById("ajukanLayanan").value;
    const pemohon = document.getElementById("ajukanNama").value.trim();
    const email = document.getElementById("ajukanEmail").value.trim();
    const fileInput = document.getElementById("ajukanFile");
    const fileName = fileInput.files[0] ? fileInput.files[0].name : null;
    if(!pemohon || !email){ showToast("Nama dan email wajib diisi"); return; }
    const newP = { id:uid(), layananId, pemohon, email, tanggal:Date.now(), status:"Diajukan", aparaturId:null, catatanPimpinan:"", dokumen:fileName, history:[{status:"Diajukan",time:Date.now()}] };
    state.pengajuan.push(newP);
    const lyn = layananById(layananId);
    state.notifikasi.unshift({ id:uid(), target:"aparatur", title:"Pengajuan baru masuk", desc:`${pemohon} mengajukan layanan ${lyn?lyn.nama:""}.`, time:Date.now(), read:false, type:"info" });
    state._preselectLayanan = null;
    state.route = "ms-tracking";
    saveState(); render(); showToast("Pengajuan berhasil dikirim");
  }
  if(e.target.id==="profilForm"){
    state.auth.name = document.getElementById("profNama").value.trim() || state.auth.name;
    state.auth.email = document.getElementById("profEmail").value.trim() || state.auth.email;
    saveState(); render(); showToast("Profil berhasil diperbarui");
  }
});

/* ============================================================
   INIT
   ============================================================ */
render();

})();
</script>
</body>
</html>
